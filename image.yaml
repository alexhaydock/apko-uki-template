---
contents:
  repositories:
    - http://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - http://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - ./config/melange.rsa.pub  # import keyring for config overlay package
  build_repositories:
    - ./config/packages/        # import local repo for config overlay package
  packages:
    # This one metapackage provides busybox, apk, musl-utils, and OpenRC among others
    - alpine-base
    # Kernel and null firmware package
    - linux-firmware-none
    - linux-virt
    # Image config overlay package
    - config-overlay
    # Workload packages
    - bash
    - nyancat
    - openssh-server
    - openssh-server-common-openrc
    - swayimg
    - waypipe
# This is where we configure which services that OpenRC will
# start, and which runlevels they will be started at
paths:
  # Services: sysinit
  - path: /etc/runlevels/sysinit/devfs
    type: symlink
    source: /etc/init.d/devfs
    permissions: 0o755  # extremely important otherwise apko clobbers the permissions of the dest file
  - path: /etc/runlevels/sysinit/dmesg
    type: symlink
    source: /etc/init.d/dmesg
    permissions: 0o755
  - path: /etc/runlevels/sysinit/mdev
    type: symlink
    source: /etc/init.d/mdev
    permissions: 0o755
  - path: /etc/runlevels/sysinit/hwdrivers
    type: symlink
    source: /etc/init.d/hwdrivers
    permissions: 0o755
  # Services: boot
  - path: /etc/runlevels/boot/bootmisc
    type: symlink
    source: /etc/init.d/bootmisc
    permissions: 0o755
  - path: /etc/runlevels/boot/hostname
    type: symlink
    source: /etc/init.d/hostname
    permissions: 0o755
  - path: /etc/runlevels/boot/hwclock
    type: symlink
    source: /etc/init.d/hwclock
    permissions: 0o755
  - path: /etc/runlevels/boot/klogd
    type: symlink
    source: /etc/init.d/klogd
    permissions: 0o755
  - path: /etc/runlevels/boot/modules
    type: symlink
    source: /etc/init.d/modules
    permissions: 0o755
  - path: /etc/runlevels/boot/networking
    type: symlink
    source: /etc/init.d/networking
    permissions: 0o755
  - path: /etc/runlevels/boot/sysctl
    type: symlink
    source: /etc/init.d/sysctl
    permissions: 0o755
  - path: /etc/runlevels/boot/syslog
    type: symlink
    source: /etc/init.d/syslog
    permissions: 0o755
  # Services: shutdown
  - path: /etc/runlevels/shutdown/killprocs
    type: symlink
    source: /etc/init.d/killprocs
    permissions: 0o755
  - path: /etc/runlevels/shutdown/mount-ro
    type: symlink
    source: /etc/init.d/mount-ro
    permissions: 0o755
  # Services: default
  - path: /etc/runlevels/default/acpid
    type: symlink
    source: /etc/init.d/acpid
    permissions: 0o755
  - path: /etc/runlevels/default/crond
    type: symlink
    source: /etc/init.d/crond
    permissions: 0o755
  - path: /etc/runlevels/default/enforceperms
    type: symlink
    source: /etc/init.d/enforceperms
    permissions: 0o755
  - path: /etc/runlevels/default/local
    type: symlink
    source: /etc/init.d/local
    permissions: 0o755
  - path: /etc/runlevels/default/sshd
    type: symlink
    source: /etc/init.d/sshd
    permissions: 0o755
# This is where we configure accounts for services
# that need to have accounts present, as apko does
# not create them when installing packages
#
# The user account is the unprivileged account we
# use for running user-based workloads
accounts:
  groups:
    - groupname: klogd
      gid: 500
    - groupname: user
      gid: 1000
  users:
    - username: klogd
      uid: 500
      shell: /sbin/nologin
    - username: user
      uid: 1000
      shell: /bin/bash
archs:
  - amd64
...
